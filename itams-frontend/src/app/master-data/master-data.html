<div class="master-data-container p-4">
  <div class="card">
    <div class="card-header">
      <h4 class="mb-0">Master Data Configuration</h4>
      <p class="text-muted mb-0">Configure vendors, asset statuses, and criticality levels</p>
    </div>
    
    <div class="card-body">
      <!-- Tab Navigation -->
      <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
          <a 
            class="nav-link" 
            [class.active]="activeTab === 'vendors'"
            (click)="setActiveTab('vendors')"
            style="cursor: pointer;">
            <i class="fas fa-building me-2"></i>Vendors
          </a>
        </li>
        <li class="nav-item">
          <a 
            class="nav-link" 
            [class.active]="activeTab === 'statuses'"
            (click)="setActiveTab('statuses')"
            style="cursor: pointer;">
            <i class="fas fa-tags me-2"></i>Asset Statuses
          </a>
        </li>
        <li class="nav-item">
          <a 
            class="nav-link" 
            [class.active]="activeTab === 'criticality'"
            (click)="setActiveTab('criticality')"
            style="cursor: pointer;">
            <i class="fas fa-exclamation-triangle me-2"></i>Criticality Levels
          </a>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
